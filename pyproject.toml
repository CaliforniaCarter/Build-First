[project]
name = "timbre"
version = "0.1.0"
description = "Timbre — captures your authentic voice and drafts on-brand posts you approve, from a cold start."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "python-dotenv>=1.0",
]

# The Anthropic SDK is OPTIONAL and DORMANT. The overnight build runs with no API
# key (the TerminalProvider uses the local agent as the model). Install this extra
# only when you want the automated re-eval path:  uv pip install -e ".[api]"
[project.optional-dependencies]
api = ["anthropic>=0.40"]

[dependency-groups]
dev = ["pytest>=8", "ruff>=0.6"]

[project.scripts]
tb = "engine.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["engine"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
