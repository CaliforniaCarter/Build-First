[project]
name = "build-first"
version = "0.1.0"
description = "Brand Voice Content Engine — turns what you actually build into on-brand, in-voice LinkedIn posts, from a cold start."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "python-dotenv>=1.0",
    "rich>=13.7",
    # The local web app (`Content`). Plain uvicorn — SSE needs no websockets/uvloop.
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "jinja2>=3.1",
    "python-multipart>=0.0.9",
]

# The Anthropic SDK is OPTIONAL and DORMANT. The default model path is your Claude
# subscription via the local `claude` CLI (ClaudeCodeProvider) — no API key. Install
# this extra only for the automated API re-eval path:  uv pip install -e ".[api]"
[project.optional-dependencies]
api = ["anthropic>=0.40"]
dev = ["pytest>=8", "httpx>=0.27"]

[project.scripts]
bf = "engine.cli:main"
Content = "engine.web.launcher:main"
content = "engine.web.launcher:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["engine"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
